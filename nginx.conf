server {
    listen 80;
    server_name localhost;

    # ניתוב כל הבקשות שמגיעות לשרת ישירות אל ה-web-app של דוקר
    location / {
        proxy_pass http://web-app:3000; # שימוש בשם השירות כפי שמוגדר ב-compose ובפורט הפנימי שלו
        
        # העברת כותרות (Headers) קריטיות כדי שהאפליקציה תדע מי הלקוח האמיתי
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}